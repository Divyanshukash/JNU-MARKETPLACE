# Server Configuration
server.port=8080
server.servlet.context-path=/api

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/jnu_marketplace
spring.data.mongodb.database=jnu_marketplace
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
jwt.secret=your-super-secret-jwt-key-for-jnu-marketplace-2024
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Stripe Configuration
stripe.secret-key=sk_test_your_stripe_secret_key
stripe.publishable-key=pk_test_your_stripe_publishable_key
stripe.webhook-secret=whsec_your_webhook_secret

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
file.upload.path=uploads/
file.upload.allowed-types=jpg,jpeg,png,gif,webp

# CORS Configuration
cors.allowed-origins=http://localhost:3000,https://jnu-marketplace.com
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Logging Configuration
logging.level.com.jnu.marketplace=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Rate Limiting
spring.cloud.gateway.default-filters=RequestRateLimiter=2, 1, 2, redis-rate-limiter, 1, 1

# WebSocket Configuration
websocket.endpoint=/ws
websocket.allowed-origins=http://localhost:3000

# Security Configuration
security.jwt.header=Authorization
security.jwt.prefix=Bearer
security.jwt.expiration=86400000

# JNU Email Domains (for verification)
jnu.email.domains=jnu.ac.in,mail.jnu.ac.in,students.jnu.ac.in

# Application Configuration
app.name=JNU Marketplace
app.version=1.0.0
app.description=Buy and sell platform for JNU community

# Notification Configuration
notification.email.enabled=true
notification.push.enabled=true
notification.sms.enabled=false

# Payment Configuration
payment.stripe.enabled=true
payment.paypal.enabled=true
payment.upi.enabled=true

# Search Configuration
search.max-results=50
search.default-page-size=20

# Cache Configuration
spring.cache.type=caffeine
spring.cache.cache-names=users,listings,messages
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=600s

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# Scheduling Configuration
spring.task.scheduling.pool.size=5

# Profile Configuration
spring.profiles.active=dev 