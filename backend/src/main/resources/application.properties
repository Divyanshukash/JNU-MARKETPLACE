# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.path=uploads/
file.upload.allowed-types=jpg,jpeg,png,gif,webp

# CORS Configuration
cors.allowed-origins=http://localhost:3000,https://jnu-marketplace.com
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Logging Configuration
logging.level.com.jnu.marketplace=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.root=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n



# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method



# Security Configuration
security.jwt.header=Authorization
security.jwt.prefix=Bearer

# JNU Email Domains (for verification)
jnu.email.domains=jnu.ac.in,mail.jnu.ac.in,students.jnu.ac.in

# Application Configuration
app.name=JNU BAZAAR
app.version=1.0.0
app.description=Buy and sell platform for JNU community





# Search Configuration
search.max-results=50
search.default-page-size=20



# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=25

# Scheduling Configuration
spring.task.scheduling.pool.size=5

# Profile Configuration
spring.profiles.active=dev 